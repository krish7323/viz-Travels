<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TourTravels Admin Panel</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eef2ff",
                100: "#e0e7ff",
                500: "#6366f1",
                600: "#4f46e5",
                700: "#4338ca",
                900: "#312e81",
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: #0f172a;
      }
      .scrollbar-thin::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 2px;
      }
      .json-key {
        color: #93c5fd;
      }
      .json-string {
        color: #86efac;
      }
      .json-number {
        color: #fbbf24;
      }
      .json-bool {
        color: #f472b6;
      }
      .json-null {
        color: #94a3b8;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin {
        animation: spin 1s linear infinite;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.2s ease-out;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;

      // ── API ───────────────────────────────────────────────────────────────────────
      const getToken = () => localStorage.getItem("admin_token");
      const setToken = (t) => localStorage.setItem("admin_token", t);
      const clearToken = () => localStorage.removeItem("admin_token");

      async function api(method, url, body) {
        const headers = { "Content-Type": "application/json" };
        const token = getToken();
        if (token) headers["Authorization"] = `Bearer ${token}`;
        const res = await fetch("/api" + url, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });
        if (res.status === 401) {
          clearToken();
          window.location.reload();
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      // ── Bcrypt ────────────────────────────────────────────────────────────────────
      const hashPassword = (plain) =>
        new Promise((resolve, reject) => {
          dcodeIO.bcrypt.hash(plain, 10, (err, hash) =>
            err ? reject(err) : resolve(hash),
          );
        });

      // ── Icons ─────────────────────────────────────────────────────────────────────
      const Icon = ({ name, size = 16, className = "" }) => {
        const icons = {
          logout: (
            <>
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </>
          ),
          database: (
            <>
              <ellipse cx="12" cy="5" rx="9" ry="3" />
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
            </>
          ),
          table: (
            <>
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M3 9h18M3 15h18M9 3v18" />
            </>
          ),
          edit: (
            <>
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </>
          ),
          trash: (
            <>
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </>
          ),
          plus: (
            <>
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </>
          ),
          search: (
            <>
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </>
          ),
          chevronLeft: <polyline points="15 18 9 12 15 6" />,
          chevronRight: <polyline points="9 18 15 12 9 6" />,
          x: (
            <>
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </>
          ),
          eye: (
            <>
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </>
          ),
          refresh: (
            <>
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-.41-4.43" />
            </>
          ),
          copy: (
            <>
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </>
          ),
          shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
          info: (
            <>
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </>
          ),
          save: (
            <>
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </>
          ),
          image: (
            <>
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </>
          ),
          chart: (
            <>
              <line x1="12" y1="20" x2="12" y2="10" />
              <line x1="18" y1="20" x2="18" y2="4" />
              <line x1="6" y1="20" x2="6" y2="16" />
            </>
          ),
        };
        return (
          <svg
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
            className={className}
          >
            {icons[name]}
          </svg>
        );
      };

      // ── Toast ─────────────────────────────────────────────────────────────────────
      function Toast({ toasts, removeToast }) {
        return (
          <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
            {toasts.map((t) => (
              <div
                key={t.id}
                className={`fade-in flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl text-sm font-medium border ${
                  t.type === "success"
                    ? "bg-emerald-900/90 border-emerald-700 text-emerald-100"
                    : t.type === "error"
                      ? "bg-red-900/90 border-red-700 text-red-100"
                      : "bg-slate-800 border-slate-600 text-slate-100"
                }`}
              >
                <span>{t.msg}</span>
                <button
                  onClick={() => removeToast(t.id)}
                  className="ml-2 opacity-60 hover:opacity-100"
                >
                  <Icon name="x" size={14} />
                </button>
              </div>
            ))}
          </div>
        );
      }

      function useToast() {
        const [toasts, setToasts] = useState([]);
        const add = (msg, type = "info") => {
          const id = Date.now();
          setToasts((t) => [...t, { id, msg, type }]);
          setTimeout(
            () => setToasts((t) => t.filter((x) => x.id !== id)),
            3500,
          );
        };
        return {
          toasts,
          toast: add,
          removeToast: (id) => setToasts((t) => t.filter((x) => x.id !== id)),
        };
      }

      // ── Spinner ───────────────────────────────────────────────────────────────────
      const Spinner = ({ size = 20 }) => (
        <svg
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          className="spin"
          stroke="currentColor"
          strokeWidth="2"
        >
          <path
            d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
            strokeOpacity="0.4"
          />
          <path d="M12 2v4" />
        </svg>
      );

      // ── JSON highlighter ──────────────────────────────────────────────────────────
      function syntaxHighlight(json) {
        const str =
          typeof json === "string" ? json : JSON.stringify(json, null, 2);
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(
            /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
            (m) => {
              if (/^"/.test(m))
                return /:$/.test(m)
                  ? `<span class="json-key">${m}</span>`
                  : `<span class="json-string">${m}</span>`;
              if (/true|false/.test(m))
                return `<span class="json-bool">${m}</span>`;
              if (/null/.test(m)) return `<span class="json-null">${m}</span>`;
              return `<span class="json-number">${m}</span>`;
            },
          );
      }

      // ── Friendly collection metadata ─────────────────────────────────────────────
      // Maps raw Mongo collection names to plain-English labels + icons so admins
      // never have to think in database terms.
      const COLLECTION_META = {
        travel_users: { label: "Customers", icon: "👤", width: "max-w-md" },
        vendors: { label: "Vendors", icon: "🏢", width: "max-w-md" },
        travel_bookings: { label: "Bookings", icon: "📋", width: "max-w-2xl" },
        packages: { label: "Tour Packages", icon: "🗺️", width: "max-w-3xl" },
      };
      function collectionMeta(name) {
        return (
          COLLECTION_META[name] || {
            label: (name || "")
              .replace(/[_-]/g, " ")
              .replace(/\b\w/g, (c) => c.toUpperCase()),
            icon: "📁",
            width: "max-w-2xl",
          }
        );
      }
      function prettifyKey(key) {
        return key
          .replace(/_/g, " ")
          .replace(/([a-z])([A-Z])/g, "$1 $2")
          .replace(/\b\w/g, (c) => c.toUpperCase());
      }
      const fmtCurrency = (n) => "₹" + Number(n || 0).toLocaleString("en-IN");

      // ── Shared form atoms ─────────────────────────────────────────────────────────
      const iCls =
        "w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition";
      const sCls =
        "w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition";

      function Field({ label, hint, children }) {
        return (
          <div>
            <label className="block text-xs font-medium text-slate-400 mb-1.5">
              {label}
              {hint && (
                <span className="ml-1 text-slate-600 font-normal">{hint}</span>
              )}
            </label>
            {children}
          </div>
        );
      }

      function ErrBox({ msg }) {
        if (!msg) return null;
        return (
          <div className="text-red-400 text-sm bg-red-900/30 border border-red-800 rounded-lg px-3 py-2 flex items-start gap-2">
            <Icon name="info" size={14} className="mt-0.5 flex-shrink-0" />
            {msg}
          </div>
        );
      }

      function FormFooter({ onClose, onSave, saving }) {
        return (
          <div className="flex gap-3 px-6 py-4 border-t border-slate-700 flex-shrink-0">
            <button
              onClick={onClose}
              className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-lg text-sm transition"
            >
              Cancel
            </button>
            <button
              onClick={onSave}
              disabled={saving}
              className="flex-1 bg-indigo-600 hover:bg-indigo-500 disabled:bg-indigo-800 text-white py-2.5 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2"
            >
              {saving ? (
                <>
                  <Spinner size={16} /> Saving...
                </>
              ) : (
                <>
                  <Icon name="save" size={15} /> Save
                </>
              )}
            </button>
          </div>
        );
      }

      function SectionTitle({ children, color = "indigo" }) {
        const c = color === "slate" ? "text-slate-400" : "text-indigo-400";
        return (
          <p
            className={`text-xs font-semibold uppercase tracking-wider mb-3 ${c}`}
          >
            {children}
          </p>
        );
      }

      // ── Package option row (outside PackageForm to avoid re-mount issues) ─────────
      function OptRow({
        opt,
        priceField = "price",
        onTitle,
        onPrice,
        onRemove,
      }) {
        return (
          <div className="flex gap-2 items-center">
            <input
              className={iCls}
              placeholder="Option name"
              value={opt.title}
              onChange={(e) => onTitle(e.target.value)}
            />
            <div className="relative flex-shrink-0 w-28">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs">
                ₹
              </span>
              <input
                className="w-full bg-slate-800 border border-slate-600 rounded-lg pl-6 pr-2 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                type="number"
                min="0"
                value={opt[priceField] || 0}
                onChange={(e) => onPrice(+e.target.value)}
              />
            </div>
            <button
              onClick={onRemove}
              className="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-red-400 hover:bg-slate-700 rounded-lg flex-shrink-0 text-xl leading-none transition"
            >
              ×
            </button>
          </div>
        );
      }

      // ── USER FORM ─────────────────────────────────────────────────────────────────
      function UserForm({
        doc,
        dbName,
        collection,
        onClose,
        onSaved,
        toast,
        mode,
      }) {
        const [form, setForm] = useState({
          name: doc.name || "",
          email: doc.email || "",
          password: "",
        });
        const [saving, setSaving] = useState(false);
        const [err, setErr] = useState("");
        const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

        const handleSave = async () => {
          if (!form.name.trim()) {
            setErr("Name is required");
            return;
          }
          if (!form.email.trim()) {
            setErr("Email is required");
            return;
          }
          if (mode === "create" && !form.password) {
            setErr("Password is required for new users");
            return;
          }
          setSaving(true);
          setErr("");
          try {
            const payload = {
              name: form.name.trim(),
              email: form.email.trim(),
            };
            if (form.password)
              payload.password = await hashPassword(form.password);
            if (mode === "create") {
              await api("POST", `/data/${dbName}/${collection}`, payload);
              toast("Customer created!", "success");
            } else {
              await api(
                "PUT",
                `/data/${dbName}/${collection}/${doc._id}`,
                payload,
              );
              toast("Customer updated!", "success");
            }
            onSaved();
          } catch (e) {
            setErr(e.message);
          } finally {
            setSaving(false);
          }
        };

        return (
          <>
            <div className="flex-1 overflow-auto p-6 space-y-4">
              <ErrBox msg={err} />
              <Field label="Full Name">
                <input
                  className={iCls}
                  value={form.name}
                  onChange={(e) => set("name", e.target.value)}
                  placeholder="Customer full name"
                />
              </Field>
              <Field label="Email Address">
                <input
                  className={iCls}
                  type="email"
                  value={form.email}
                  onChange={(e) => set("email", e.target.value)}
                  placeholder="user@example.com"
                />
              </Field>
              <Field
                label={mode === "create" ? "Password" : "New Password"}
                hint={mode !== "create" ? "— leave blank to keep current" : ""}
              >
                <input
                  className={iCls}
                  type="password"
                  value={form.password}
                  onChange={(e) => set("password", e.target.value)}
                  placeholder={
                    mode === "create"
                      ? "Set a strong password"
                      : "Leave blank to keep unchanged"
                  }
                  autoComplete="new-password"
                />
              </Field>
              {mode === "edit" && (doc.createdAt || doc.updatedAt) && (
                <div className="bg-slate-800/50 rounded-lg p-3 space-y-1">
                  {doc.createdAt && (
                    <p className="text-xs text-slate-500">
                      Created: {new Date(doc.createdAt).toLocaleString()}
                    </p>
                  )}
                  {doc.updatedAt && (
                    <p className="text-xs text-slate-500">
                      Updated: {new Date(doc.updatedAt).toLocaleString()}
                    </p>
                  )}
                </div>
              )}
            </div>
            <FormFooter onClose={onClose} onSave={handleSave} saving={saving} />
          </>
        );
      }

      // ── VENDOR FORM ───────────────────────────────────────────────────────────────
      function VendorForm({
        doc,
        dbName,
        collection,
        onClose,
        onSaved,
        toast,
        mode,
      }) {
        const [form, setForm] = useState({
          companyName: doc.companyName || "",
          email: doc.email || "",
          password: "",
        });
        const [saving, setSaving] = useState(false);
        const [err, setErr] = useState("");
        const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

        const handleSave = async () => {
          if (!form.companyName.trim()) {
            setErr("Company name is required");
            return;
          }
          if (!form.email.trim()) {
            setErr("Email is required");
            return;
          }
          if (mode === "create" && !form.password) {
            setErr("Password is required for new vendors");
            return;
          }
          setSaving(true);
          setErr("");
          try {
            const payload = {
              companyName: form.companyName.trim(),
              email: form.email.trim(),
            };
            if (form.password)
              payload.password = await hashPassword(form.password);
            if (mode === "create") {
              await api("POST", `/data/${dbName}/${collection}`, payload);
              toast("Vendor created!", "success");
            } else {
              await api(
                "PUT",
                `/data/${dbName}/${collection}/${doc._id}`,
                payload,
              );
              toast("Vendor updated!", "success");
            }
            onSaved();
          } catch (e) {
            setErr(e.message);
          } finally {
            setSaving(false);
          }
        };

        return (
          <>
            <div className="flex-1 overflow-auto p-6 space-y-4">
              <ErrBox msg={err} />
              <Field label="Company Name">
                <input
                  className={iCls}
                  value={form.companyName}
                  onChange={(e) => set("companyName", e.target.value)}
                  placeholder="Company / brand name"
                />
              </Field>
              <Field label="Email Address">
                <input
                  className={iCls}
                  type="email"
                  value={form.email}
                  onChange={(e) => set("email", e.target.value)}
                  placeholder="vendor@company.com"
                />
              </Field>
              <Field
                label={mode === "create" ? "Password" : "New Password"}
                hint={mode !== "create" ? "— leave blank to keep current" : ""}
              >
                <input
                  className={iCls}
                  type="password"
                  value={form.password}
                  onChange={(e) => set("password", e.target.value)}
                  placeholder={
                    mode === "create"
                      ? "Set a strong password"
                      : "Leave blank to keep unchanged"
                  }
                  autoComplete="new-password"
                />
              </Field>
              {mode === "create" && (
                <div className="bg-slate-800/50 rounded-lg p-3 text-xs text-slate-500">
                  Password will be hashed with bcrypt (10 rounds) before saving.
                </div>
              )}
            </div>
            <FormFooter onClose={onClose} onSave={handleSave} saving={saving} />
          </>
        );
      }

      // ── BOOKING FORM ──────────────────────────────────────────────────────────────
      function BookingForm({
        doc,
        dbName,
        collection,
        onClose,
        onSaved,
        toast,
        mode,
      }) {
        const [form, setForm] = useState({
          fullName: doc.fullName || "",
          email: doc.email || "",
          phone: doc.phone || "",
          tourId: doc.tourId || "",
          tourName: doc.tourName || "",
          vendorEmail: doc.vendorEmail || "",
          basePrice: doc.basePrice ?? 0,
          totalAmount: doc.totalAmount ?? 0,
          advanceAmount: doc.advanceAmount ?? 0,
          razorpayOrderId: doc.razorpayOrderId || "",
          razorpayPaymentId: doc.razorpayPaymentId || "",
          paymentStatus: doc.paymentStatus || "pending",
          advancePaid: !!doc.advancePaid,
        });
        const [saving, setSaving] = useState(false);
        const [err, setErr] = useState("");
        const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
        const remaining = form.totalAmount - form.advanceAmount;

        const handleSave = async () => {
          if (!form.fullName.trim()) {
            setErr("Full name is required");
            return;
          }
          if (!form.email.trim()) {
            setErr("Email is required");
            return;
          }
          if (!form.phone.trim()) {
            setErr("Phone is required");
            return;
          }
          setSaving(true);
          setErr("");
          try {
            const payload = { ...form, remainingAmount: remaining };
